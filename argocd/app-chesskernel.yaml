apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: chesskernel
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2" # after platform is healthy
spec:
  project: default
  source:
    repoURL: https://github.com/mateuseap/homelab
    targetRevision: main
    path: apps/chesskernel
  destination:
    server: https://kubernetes.default.svc
    namespace: chesskernel
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
