apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0" # before anything that needs Certificates
spec:
  project: default
  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    targetRevision: v1.15.3
    helm:
      values: |
        installCRDs: true
        resources:
          requests: { cpu: 10m, memory: 64Mi }
          limits: { memory: 128Mi }
        webhook:
          resources:
            requests: { cpu: 5m, memory: 32Mi }
        cainjector:
          resources:
            requests: { cpu: 10m, memory: 64Mi }
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
