# TEMPLATE, never commit filled-in copies (see .gitignore).
# Lives in docs/ (NOT apps/) because ArgoCD applies every YAML under apps/.
# Workflow: docs/RUNBOOK.md, section Secrets. livekit-keys must be the
# combined "key: secret" string LiveKit expects in LIVEKIT_KEYS.
apiVersion: v1
kind: Secret
metadata:
  name: pixelhub-secrets
  namespace: pixelhub
stringData:
  livekit-api-key: pixelhub-CHANGE-ME # e.g. pixelhub-$(openssl rand -hex 4)
  livekit-api-secret: CHANGE-ME # e.g. $(openssl rand -base64 36 | tr -d '/+=' | cut -c1-44)
  livekit-keys: "pixelhub-CHANGE-ME: CHANGE-ME" # "<key>: <secret>" combined
