# Two hostnames, one app: the lab subdomain plus chesskernel's own domain.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chesskernel
  namespace: chesskernel
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
    - host: chess.lab.mateuseap.com
      http: &routes
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: client
                port:
                  number: 80
    - host: chesskernel.com
      http: *routes
    - host: www.chesskernel.com
      http: *routes
  tls:
    - hosts: [chess.lab.mateuseap.com]
      secretName: chesskernel-lab-tls
    - hosts: [chesskernel.com, www.chesskernel.com]
      secretName: chesskernel-own-tls
