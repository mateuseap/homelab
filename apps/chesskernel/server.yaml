apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
  namespace: chesskernel
spec:
  replicas: 1
  selector:
    matchLabels: { app: server }
  template:
    metadata:
      labels: { app: server }
    spec:
      containers:
        - name: server
          image: ghcr.io/mateuseap/chesskernel-server:latest
          imagePullPolicy: Always # tracks :latest; `kubectl rollout restart` after CI push
          ports: [{ containerPort: 3001 }]
          env:
            - name: NODE_ENV
              value: production
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: chesskernel-secrets, key: postgres-password }
            - name: DATABASE_URL
              value: postgresql://chesskernel:$(POSTGRES_PASSWORD)@postgres:5432/chesskernel
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef: { name: chesskernel-secrets, key: redis-password }
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef: { name: chesskernel-secrets, key: jwt-secret }
            - name: JWT_ACCESS_EXPIRES_IN
              value: 15m
            - name: JWT_REFRESH_EXPIRES_IN
              value: 7d
            - name: CLIENT_ORIGIN
              value: https://chess.lab.mateuseap.com
          resources:
            requests: { cpu: 50m, memory: 150Mi }
            limits: { memory: 350Mi }
          readinessProbe:
            tcpSocket: { port: 3001 }
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  # Must be named `server`: the client nginx proxies /api and /socket.io
  # to http://server:3001 (see chesskernel docker/nginx/nginx.client.conf).
  name: server
  namespace: chesskernel
spec:
  selector: { app: server }
  ports: [{ port: 3001 }]
