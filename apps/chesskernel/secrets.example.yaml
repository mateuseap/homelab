# TEMPLATE — never commit filled-in copies of this file (see .gitignore).
#
# Workflow (details in docs/RUNBOOK.md § Secrets):
#   1. cp secrets.example.yaml /tmp/secrets.yaml   # outside the repo
#   2. fill in real values
#   3. kubeseal --controller-namespace kube-system --format yaml \
#        < /tmp/secrets.yaml > sealed-secrets.yaml
#   4. commit sealed-secrets.yaml (safe: only the cluster can decrypt it)
#   5. shred -u /tmp/secrets.yaml
apiVersion: v1
kind: Secret
metadata:
  name: chesskernel-secrets
  namespace: chesskernel
stringData:
  postgres-password: CHANGE-ME
  redis-password: CHANGE-ME
  jwt-secret: CHANGE-ME # openssl rand -base64 48
---
apiVersion: v1
kind: Secret
metadata:
  name: r2-backup-credentials
  namespace: chesskernel
stringData:
  access-key-id: CHANGE-ME # Cloudflare dashboard → R2 → API tokens
  secret-access-key: CHANGE-ME
  endpoint: https://ACCOUNT_ID.r2.cloudflarestorage.com
  bucket: homelab-backups
