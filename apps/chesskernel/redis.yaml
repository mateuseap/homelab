apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: chesskernel
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  strategy: { type: Recreate } # single PVC, don't run two writers
  template:
    metadata:
      labels: { app: redis }
    spec:
      securityContext:
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: redis
          image: redis:7-alpine
          securityContext:
            allowPrivilegeEscalation: false
          args: [--requirepass, "$(REDIS_PASSWORD)", --appendonly, "yes"]
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef: { name: chesskernel-secrets, key: redis-password }
          ports: [{ containerPort: 6379 }]
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { memory: 128Mi }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: redis-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: chesskernel
spec:
  storageClassName: local-path
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: chesskernel
spec:
  selector: { app: redis }
  ports: [{ port: 6379 }]
