# Let's Encrypt via HTTP-01 through Traefik — works with any DNS provider,
# no API tokens needed. One cert per hostname, all automatic.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: mateuseap@mateuseap.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            class: traefik
